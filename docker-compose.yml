services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: gigsa
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: on-failure
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "mysql://root:rootpassword@db:3306/gigsa"
      JWT_SECRET: "dev-secret-change-me"
      PORT: 3000
      FRONTEND_URL: "http://localhost:5174"
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma db push && node src/server.js"

volumes:
  mysql_data:
